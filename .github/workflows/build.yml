name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore AndroidEmulatorPlus/AndroidEmulatorPlus.csproj

      - name: Build (Release)
        run: dotnet build AndroidEmulatorPlus/AndroidEmulatorPlus.csproj -c Release --no-restore

      - name: Test
        run: |
          if (Test-Path AndroidEmulatorPlus.Tests/AndroidEmulatorPlus.Tests.csproj) {
            dotnet test AndroidEmulatorPlus.Tests/AndroidEmulatorPlus.Tests.csproj -c Release --no-build --verbosity normal
          } else {
            Write-Host "No test project yet; skipping."
          }
        shell: pwsh

      - name: Publish (framework-dependent, x64)
        run: |
          dotnet publish AndroidEmulatorPlus/AndroidEmulatorPlus.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=true `
            -o publish/fd
        shell: pwsh

      - name: Publish (self-contained, x64)
        run: |
          dotnet publish AndroidEmulatorPlus/AndroidEmulatorPlus.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/sc
        shell: pwsh

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidEmulatorPlus-win-x64-framework
          path: publish/fd/*

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidEmulatorPlus-win-x64-self-contained
          path: publish/sc/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Publish (self-contained, x64)
        run: |
          dotnet publish AndroidEmulatorPlus/AndroidEmulatorPlus.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/velopack
        shell: pwsh

      - name: Package Velopack release
        run: |
          dotnet tool install -g vpk --version 1.2.0
          $vpk = Join-Path $env:USERPROFILE ".dotnet\tools\vpk.exe"

          & $vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir Releases
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Velopack release found; continuing with a full package."
          }

          & $vpk pack `
            --packId SysAdminDoc.AndroidEmulatorPlus `
            --packTitle AndroidEmulatorPlus `
            --packAuthors SysAdminDoc `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish/velopack `
            --mainExe AndroidEmulatorPlus.exe `
            --runtime win-x64 `
            --icon AndroidEmulatorPlus/Assets/aep.ico `
            --outputDir Releases `
            --yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Upload Velopack release
        run: |
          $vpk = Join-Path $env:USERPROFILE ".dotnet\tools\vpk.exe"
          & $vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir Releases `
            --publish `
            --merge `
            --releaseName "AndroidEmulatorPlus ${{ github.ref_name }}" `
            --tag ${{ github.ref_name }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh
